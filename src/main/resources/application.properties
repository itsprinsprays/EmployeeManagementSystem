# ===============================
# MySQL Database Configuration
# ===============================
spring.datasource.url=jdbc:mysql://mysql:3306/employeemanagementsystem
spring.datasource.username=root
spring.datasource.password=12312004
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT Secret Key
jwt.secret=THIS_IS_A_SUPER_SECURE_SECRET_KEY_FOR_JWT_2026_BACKEND_DEV
jwt.accessExpiration=86400000
jwt.refreshExpiration=604800000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Redis Configuration
# ===============================
spring.cache.type=redis
spring.redis.host=redis
spring.redis.port=6379

# ===============================
# Server Port (Optional if needed)
# ===============================
server.port=8080